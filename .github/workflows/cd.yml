
name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        run: |
          docker build -f docker/backend.Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ecogrid-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ecogrid-backend:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecogrid-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecogrid-backend:${{ github.sha }}

      - name: Build & push frontend image
        run: |
          docker build -f docker/frontend.Dockerfile \
            --build-arg VITE_API_URL=http://localhost:4000 \
            --build-arg VITE_WS_URL=ws://localhost:4000 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ecogrid-frontend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ecogrid-frontend:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecogrid-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecogrid-frontend:${{ github.sha }}

      - name: Done
        run: echo "Images pushed to Docker Hub successfully"